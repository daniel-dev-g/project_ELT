# config/pipeline.yaml
# DataBridge — Pipeline Configuration
# Supported formats: .csv, .txt (BCP bulk load)
# Delimiter: use ";" "," "|" or "\t" for tab-separated files
# Encoding: utf8, utf8-lossy, ascii
task:
  - name: "Carga de Ventas Mensuales"
    file: "data/input/cliente.csv"
    delimiter: ";"
    encoding: "utf8"
    table_destination: "clientes"
    crear_tabla_si_no_existe: true
    schema: ""   # SQL Server: "dbo" | PostgreSQL: "public" | MySQL/MariaDB: dejar vacío
    active: true

  - name: "Carga de Oficinas Mensuales"
    file: "data/input/oficinas.csv"
    delimiter: ";"
    encoding: "utf8"
    table_destination: "oficinas"
    crear_tabla_si_no_existe: true
    schema: ""   # SQL Server: "dbo" | PostgreSQL: "public" | MySQL/MariaDB: dejar vacío
    active: true

  - name: "Carga datos USA"
    file: "data/input/tripdata_2015-01.csv"
    delimiter: ","
    encoding: "utf8"
    table_destination: "US_Taxi-Demand"
    crear_tabla_si_no_existe: true
    schema: ""   # SQL Server: "dbo" | PostgreSQL: "public" | MySQL/MariaDB: dejar vacío
    active: true
