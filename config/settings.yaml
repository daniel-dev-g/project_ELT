# config/settings.yaml
# Activa el motor deseado descomentando su bloque.
# Solo un bloque development activo a la vez.
# Completa username y password con tus credenciales.

# ─────────────────────────────────────────────
# SQL Server
# ─────────────────────────────────────────────
development:
  db_engine: sqlserver
  driver: "ODBC Driver 18 for SQL Server"
  server: "localhost,1433"
  database: "demo_db"
  username: ""
  password: ""
  trusted_connection: "no"
  encrypt: "no"
  bulk_path_map:
    host: "/ruta/absoluta/proyecto/data"  # Linux/Mac — ajusta a tu ruta real
    # host: "C:\\ruta\\proyecto\\data"    # Windows
    container: "/data"
  log_level: "INFO"

