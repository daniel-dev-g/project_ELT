# config/settings.yaml
# Activa el motor deseado descomentando su bloque.
# Solo un bloque development activo a la vez.
# Completa username y password con tus credenciales.

# ─────────────────────────────────────────────
# SQL Server
# ─────────────────────────────────────────────
development:
  db_engine: sqlserver
  driver: "ODBC Driver 18 for SQL Server"
  server: "${SQLSERVER_HOST},1433"
  database: ${SQLSERVER_DB}
  username: ${SQLSERVER_USER}
  password: ${SQLSERVER_PASSWORD}
  trusted_connection: "no"
  encrypt: "no"
  bulk_path_map:
    host: "/app/data"      # path en el contenedor de la app (WORKDIR=/app)
    # host: "C:\\ruta\\proyecto\\data"    # Windows
    container: "/data"     # path en el contenedor de SQL Server (./data:/data)
  log_level: "INFO"

