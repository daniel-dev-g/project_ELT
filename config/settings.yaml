# config/settings.yaml
# Activa el motor deseado descomentando su bloque.
# Solo un bloque development activo a la vez.
# Completa username y password con tus credenciales.
#
# bulk_path_map:
#   host      → ruta que ve el contenedor Python (BULK_PATH_HOST en .env)
#   container → ruta que ve la BD (BULK_PATH_CONTAINER en .env)
#
# Escenario A (Docker completo): docker-compose sobreescribe ambos automáticamente
# Escenario B (BD externa):      el usuario configura ambos en .env según su entorno

