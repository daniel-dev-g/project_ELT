# ─────────────────────────────────────────────
# PostgreSQL
# ─────────────────────────────────────────────
development:
  db_engine: postgres
  default_schema: "public"
  host: "localhost"
  port: 5433
  database: ${POSTGRES_DB}
  username: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}
  bulk_path_map:
    host: "/home/daniel/Documentos/ti/proyectos/project_ELT/data"
    container: "/data"
  log_level: "INFO"

