# ─────────────────────────────────────────────
# PostgreSQL
# ─────────────────────────────────────────────
development:
  db_engine: postgres
  default_schema: "public"
  host: "${POSTGRES_HOST}"
  port: "${POSTGRES_PORT}"
  database: ${POSTGRES_DB}
  username: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}
  bulk_path_map:
    host: "${BULK_PATH_HOST}"
    container: "${BULK_PATH_CONTAINER}"
  log_level: "INFO"

