# ─────────────────────────────────────────────
# MariaDB (reemplaza MySQL 8)
# ─────────────────────────────────────────────
development:
  db_engine: mysql
  default_schema: ""
  host: "localhost"
  port: 3307
  database: ${MYSQL_DB}
  username: ${MYSQL_USER}
  password: ${MYSQL_PASSWORD}
  bulk_path_map:
    host: "/home/daniel/Documentos/ti/proyectos/project_ELT/data"
    container: "/data"
  log_level: "INFO"

