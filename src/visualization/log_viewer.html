<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FlowELT — Pipeline Monitor | Dark Elegant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

 :root {
    /* Modo claro suave - reducido el blanco, tonos más cálidos */
    --bg-deep: #eef2f5;
    --bg-surface: #f8fafc;
    --bg-elevated: #f1f5f9;
    --bg-card: #ffffff;
    --border-subtle: #e2e8f0;
    --border-medium: #cbd5e1;
    --accent-primary: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.08);
    --accent-soft: #dbeafe;
    /* Textos con excelente contraste pero suaves */
    --text-primary: #1e293b;
    --text-secondary: #475569;
    --text-tertiary: #64748b;
    --success: #10b981;
    --success-glow: rgba(16, 185, 129, 0.08);
    --error: #ef4444;
    --error-glow: rgba(239, 68, 68, 0.08);
    --warning: #f59e0b;
    --warning-glow: rgba(245, 158, 11, 0.08);
    --purple-accent: #8b5cf6;
    --purple-glow: rgba(139, 92, 246, 0.08);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --transition-fast: 0.15s ease;
    --transition-smooth: 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg-deep);
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
    letter-spacing: -0.01em;
}

/* efecto de textura muy sutil */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.02) 0%, transparent 80%);
    pointer-events: none;
    z-index: 999;
}

/* scrollbar elegante */
::-webkit-scrollbar {
    width: 5px;
    height: 5px;
}
::-webkit-scrollbar-track {
    background: var(--bg-surface);
    border-radius: 10px;
}
::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--accent-primary);
}

/* topbar — menos blanco, más translúcido */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 36px;
    height: 64px;
    background: rgba(248, 250, 252, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    z-index: 110;
}

.logo {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.8px;
    background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: flex;
    align-items: center;
    gap: 10px;
}
.logo-dot {
    width: 9px;
    height: 9px;
    background: var(--accent-primary);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
    animation: softPulse 2.2s infinite;
}
@keyframes softPulse {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
}

.topbar-meta {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 24px;
}
.execution-badge {
    background: rgba(59, 130, 246, 0.1);
    border: 0.5px solid rgba(59, 130, 246, 0.2);
    padding: 5px 14px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.2px;
    color: var(--accent-primary);
}

/* layout grid */
.layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 64px);
}

/* sidebar — fondo más integrado, menos blanco */
.sidebar {
    background: rgba(241, 245, 249, 0.8);
    backdrop-filter: blur(4px);
    border-right: 1px solid var(--border-subtle);
    padding: 28px 0;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
}

.sidebar-section {
    padding: 0 20px;
    margin-bottom: 32px;
}
.sidebar-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 14px;
    padding-left: 8px;
}
.nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: all var(--transition-fast);
    margin-bottom: 6px;
    border: 1px solid transparent;
}
.nav-item:hover {
    background: rgba(59, 130, 246, 0.06);
    color: var(--text-primary);
    border-color: rgba(59, 130, 246, 0.15);
}
.nav-item.active {
    background: var(--accent-glow);
    border-color: rgba(59, 130, 246, 0.25);
    color: var(--accent-primary);
}
.nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
}
.nav-count {
    margin-left: auto;
    font-size: 11px;
    background: #e2e8f0;
    padding: 2px 8px;
    border-radius: 30px;
    color: var(--text-secondary);
    font-weight: 500;
}

/* summary block */
.summary-stats {
    background: rgba(255, 255, 255, 0.7);
    border-radius: 16px;
    padding: 14px 18px;
    margin-top: 8px;
    border: 0.5px solid var(--border-subtle);
}
.summary-stats > div {
    font-size: 13px;
    line-height: 1.9;
    color: var(--text-secondary);
}
.summary-stats span {
    color: var(--text-primary);
    font-weight: 500;
}

/* main area */
.main {
    padding: 32px 36px;
    background: radial-gradient(ellipse at 20% 30%, rgba(59, 130, 246, 0.02), transparent);
}

/* KPI cards — menos blanco, más integración */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 32px;
}
.kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 20px;
    padding: 20px 22px;
    position: relative;
    transition: all var(--transition-smooth);
    backdrop-filter: blur(2px);
    overflow: hidden;
}
.kpi-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}
.kpi-card:hover {
    transform: translateY(-3px);
    border-color: rgba(59, 130, 246, 0.4);
    box-shadow: 0 12px 28px -12px rgba(0, 0, 0, 0.1);
}
.kpi-card:hover::after {
    opacity: 0.6;
}
.kpi-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 12px;
}
.kpi-value {
    font-family: 'Outfit', sans-serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 6px;
    letter-spacing: -1px;
}
.kpi-card.blue .kpi-value { color: var(--accent-primary); }
.kpi-card.green .kpi-value { color: var(--success); }
.kpi-card.red .kpi-value { color: var(--error); }
.kpi-card.purple .kpi-value { color: var(--purple-accent); }
.kpi-sub {
    font-size: 12px;
    color: var(--text-tertiary);
}

/* timeline wrap — más suave */
.timeline-wrap {
    background: rgba(248, 250, 252, 0.8);
    backdrop-filter: blur(4px);
    border: 0.5px solid var(--border-subtle);
    border-radius: 24px;
    padding: 20px 24px;
    margin-bottom: 32px;
}
.section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
}
.section-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
}
.section-title::before {
    content: '';
    width: 4px;
    height: 18px;
    background: linear-gradient(135deg, var(--accent-primary), #60a5fa);
    border-radius: 4px;
}
.timeline-track {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 12px;
}
.timeline-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}
.timeline-dot:hover {
    transform: scale(1.45);
    box-shadow: 0 0 8px currentColor;
}
.timeline-dot.ok { background: var(--success); box-shadow: 0 0 4px var(--success); }
.timeline-dot.err { background: var(--error); box-shadow: 0 0 4px var(--error); }
.timeline-dot.info { background: var(--accent-primary); }
.timeline-dot.warn { background: var(--warning); }

/* search & filters */
.search-wrap {
    position: relative;
    margin-bottom: 18px;
}
.search-input {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 44px;
    padding: 12px 20px 12px 48px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-primary);
    transition: all var(--transition-fast);
}
.search-input:focus {
    border-color: var(--accent-primary);
    outline: none;
    box-shadow: 0 0 0 2px var(--accent-glow);
}
.search-input::placeholder {
    color: var(--text-tertiary);
}
.search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--text-tertiary);
}
.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.filter-btn {
    padding: 6px 18px;
    border-radius: 40px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    background: #f1f5f9;
    border: 0.5px solid var(--border-subtle);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
}
.filter-btn:hover {
    background: rgba(59, 130, 246, 0.1);
    color: var(--accent-primary);
    border-color: var(--accent-primary);
}
.filter-btn.active {
    background: var(--accent-glow);
    border-color: var(--accent-primary);
    color: var(--accent-primary);
}
.filter-btn.success.active {
    background: var(--success-glow);
    border-color: var(--success);
    color: var(--success);
}
.filter-btn.error.active {
    background: var(--error-glow);
    border-color: var(--error);
    color: var(--error);
}

/* event table — menos blanco, más integrado */
.event-table {
    background: var(--bg-surface);
    border-radius: 20px;
    border: 0.5px solid var(--border-subtle);
    overflow: hidden;
}
.event-table-header {
    display: grid;
    grid-template-columns: 150px 160px 1fr 80px;
    padding: 14px 20px;
    background: #eef2f5;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-secondary);
}
.event-row {
    display: grid;
    grid-template-columns: 150px 160px 1fr 80px;
    padding: 0 20px;
    border-bottom: 0.5px solid var(--border-subtle);
    cursor: pointer;
    transition: background 0.15s;
    min-height: 56px;
    align-items: center;
}
.event-row:last-child {
    border-bottom: none;
}
.event-row:hover {
    background: rgba(59, 130, 246, 0.03);
}
.event-time {
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    color: var(--text-secondary);
    font-weight: 500;
}
.event-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.2px;
    background: #eef2f5;
    color: var(--text-secondary);
    border: 0.5px solid var(--border-subtle);
}
.badge-pipeline_start, .badge-pipeline_init {
    background: var(--accent-glow);
    color: var(--accent-primary);
    border-color: rgba(59, 130, 246, 0.25);
}
.badge-file_analysis {
    background: var(--success-glow);
    color: var(--success);
    border-color: rgba(16, 185, 129, 0.25);
}
.badge-pipeline_summary {
    background: var(--purple-glow);
    color: var(--purple-accent);
}
.badge-metadata, .badge-columns {
    background: rgba(139, 92, 246, 0.08);
    color: #7c3aed;
}
.badge-analysis_error, .badge-critical_error, .badge-file_not_found {
    background: var(--error-glow);
    color: var(--error);
}
.event-summary {
    font-size: 13px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 12px;
}
.event-expand {
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: right;
    transition: transform 0.2s, color 0.2s;
}
.event-row.expanded .event-expand {
    transform: rotate(90deg);
    color: var(--accent-primary);
}

/* detail panel — más suave */
.detail-panel {
    display: none;
    padding: 20px 24px;
    background: #f9fbfd;
    border-top: 1px solid var(--border-subtle);
}
.detail-panel.show {
    display: block;
}
.detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
}
.detail-field {
    background: #f1f5f9;
    border-radius: 14px;
    padding: 12px 16px;
    border: 0.5px solid var(--border-subtle);
}
.detail-key {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    margin-bottom: 8px;
}
.detail-val {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
}
.detail-val.num { color: var(--accent-primary); font-family: monospace; font-weight: 600;}
.detail-val.ok { color: var(--success); font-weight: 600;}
.detail-val.err { color: var(--error); font-weight: 600;}

.cols-section {
    margin-top: 16px;
}
.cols-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    cursor: pointer;
    color: var(--accent-primary);
    background: rgba(59, 130, 246, 0.08);
    padding: 4px 14px;
    border-radius: 40px;
    transition: 0.2s;
}
.cols-grid {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    margin-top: 14px;
}
.cols-grid.show {
    display: grid;
}
.col-chip {
    background: #f1f5f9;
    border: 0.5px solid var(--border-subtle);
    border-radius: 40px;
    padding: 5px 14px;
    font-size: 12px;
    display: flex;
    gap: 8px;
    color: var(--text-secondary);
}
.status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: #f1f5f9;
    border-top: 0.5px solid var(--border-subtle);
    font-size: 12px;
    color: var(--text-secondary);
}

.file-list-toggle {
    display: inline-flex;
    gap: 6px;
    font-size: 12px;
    background: rgba(59, 130, 246, 0.1);
    padding: 2px 12px;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.15s;
    color: var(--accent-primary);
}
.file-list-dropdown {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
    background: var(--bg-elevated);
    border-radius: 14px;
    padding: 12px;
    max-height: 200px;
    overflow-y: auto;
    border: 0.5px solid var(--border-subtle);
}
.file-list-dropdown.show { display: flex; }
.file-list-item {
    font-size: 12px;
    padding: 4px 8px;
    border-left: 2px solid var(--accent-primary);
    color: var(--text-secondary);
}

.empty-state {
    text-align: center;
    padding: 60px;
    color: var(--text-tertiary);
}
.summary-inline {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}
.summary-tag {
    background: #eef2f5;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
}
.summary-tag.ok { background: var(--success-glow); color: var(--success);}
.summary-tag.err { background: var(--error-glow); color: var(--error);}
.summary-filename {
    font-family: monospace;
    font-size: 12px;
    color: var(--text-primary);
}

/* responsive */
@media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .kpi-grid { grid-template-columns: repeat(2,1fr); }
    .main { padding: 20px; }
    .event-table-header, .event-row {
        grid-template-columns: 110px 120px 1fr;
    }
    .event-table-header > :last-child, .event-row > :last-child { display: none; }
}
    </style>
</head>
<body>
<div class="topbar">
    <div class="logo"><div class="logo-dot"></div>FlowELT</div>
    <div class="topbar-meta"><span id="log-filename">—</span><span class="execution-badge" id="exec-id">execution_id</span><span id="last-update"></span></div>
</div>
<div class="layout">
    <aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">Views</div>
        <div class="nav-item active" onclick="setView('all', this)"><div class="nav-dot" style="background: var(--accent-primary)"></div>All Events<span class="nav-count" id="nav-all">0</span></div>
        <div class="nav-item" onclick="setView('pipeline', this)"><div class="nav-dot" style="background: var(--purple-accent)"></div>Pipeline<span class="nav-count" id="nav-pipeline">0</span></div>
        <div class="nav-item" onclick="setView('file_analysis', this)"><div class="nav-dot" style="background: var(--success)"></div>File Analysis<span class="nav-count" id="nav-file_analysis">0</span></div>
        <div class="nav-item" onclick="setView('errors', this)"><div class="nav-dot" style="background: var(--error)"></div>Errors<span class="nav-count" id="nav-errors">0</span></div>
    </div>
    <div class="sidebar-section"><div class="sidebar-label">Summary</div><div class="summary-stats"><div>Files: <span id="sb-files">—</span></div><div>Rows: <span id="sb-rows">—</span></div><div>Duration: <span id="sb-duration">—</span></div><div>Status: <span id="sb-status">—</span></div></div></div></aside>
    <main class="main">
        <div class="kpi-grid"><div class="kpi-card blue"><div class="kpi-label">Total Events</div><div class="kpi-value" id="kpi-total">—</div><div class="kpi-sub">log entries</div></div>
        <div class="kpi-card green"><div class="kpi-label">Files OK</div><div class="kpi-value" id="kpi-success">—</div><div class="kpi-sub">analyzed</div></div>
        <div class="kpi-card red"><div class="kpi-label">Errors</div><div class="kpi-value" id="kpi-errors">—</div><div class="kpi-sub">failed files</div></div>
        <div class="kpi-card purple"><div class="kpi-label">Total Rows</div><div class="kpi-value" id="kpi-rows">—</div><div class="kpi-sub">processed</div></div></div>
        <div class="timeline-wrap"><div class="section-header"><div class="section-title">Event Timeline</div><span id="timeline-range" style="font-size:12px;"></span></div><div class="timeline-track" id="timeline-track"></div></div>
        <div class="section-header"><div class="section-title">Event Log</div><div><button class="filter-btn" onclick="expandAll()">Expand All</button><button class="filter-btn" onclick="collapseAll()" style="margin-left:6px;">Collapse</button></div></div>
        <div class="search-wrap"><span class="search-icon">⌕</span><input class="search-input" id="search-input" placeholder="Search events, files, columns..." oninput="applyFilters()"></div>
        <div class="filters" id="filter-bar"></div>
        <div class="event-table"><div class="event-table-header"><span>Timestamp</span><span>Event</span><span>Summary</span><span style="text-align:right">▶</span></div><div id="events-body"></div><div class="status-bar"><div class="status-dot green" id="status-dot"></div><span id="status-text">Ready</span><span style="margin-left:auto" id="status-count"></span></div></div>
    </main>
</div>
<script>
    const RAW_DATA = __LOG_DATA__ || [];
    let currentView='all', currentFilter='all', searchQuery='', expandedRows=new Set();
    function init(){
        if(!RAW_DATA.length){ document.getElementById('events-body').innerHTML='<div class="empty-state">No log data</div>'; return; }
        buildKPIs(); buildTimeline(); buildFilterBar(); renderEvents();
        let execId = (RAW_DATA.find(e=>e.detalles?.execution_id)?.detalles?.execution_id) || 'unknown';
        document.getElementById('exec-id').textContent=execId.slice(0,8)+'...';
        let last=RAW_DATA[RAW_DATA.length-1];
        document.getElementById('last-update').textContent=last?.timestamp?.split('T')[1]?.slice(0,8)||'';
        document.getElementById('log-filename').textContent='pipeline.log';
    }
    function getPipelineSummary(){ return RAW_DATA.find(e=>e.evento==='pipeline_summary')?.detalles||null; }
    function isError(e){ return ['analysis_error','file_not_found','critical_error'].includes(e.evento); }
    function buildKPIs(){
        let total=RAW_DATA.length, errors=RAW_DATA.filter(isError).length, summary=getPipelineSummary();
        let totalRows=summary?.total_rows??RAW_DATA.filter(e=>e.evento==='file_analysis').reduce((s,e)=>s+(e.detalles?.rows||0),0);
        let filesOk=summary?.files_ok??RAW_DATA.filter(e=>e.evento==='file_analysis').length;
        document.getElementById('kpi-total').textContent=total.toLocaleString();
        document.getElementById('kpi-success').textContent=filesOk.toLocaleString();
        document.getElementById('kpi-errors').textContent=errors.toLocaleString();
        let rowsDisplay=totalRows>999999?(totalRows/1e6).toFixed(1)+'M':totalRows>999?(totalRows/1e3).toFixed(1)+'K':totalRows.toString();
        document.getElementById('kpi-rows').textContent=rowsDisplay;
        let totalFiles=summary?.total_files??RAW_DATA.filter(e=>e.evento==='file_analysis').length;
        document.getElementById('sb-files').textContent=`${filesOk} / ${totalFiles}`;
        document.getElementById('sb-rows').textContent=totalRows.toLocaleString();
        let hasErr=errors>0;
        document.getElementById('sb-status').textContent=hasErr?'PARTIAL':'OK';
        document.getElementById('sb-status').style.color=hasErr?'var(--error)':'var(--success)';
        document.getElementById('nav-all').textContent=total;
        document.getElementById('nav-pipeline').textContent=RAW_DATA.filter(e=>['pipeline_start','pipeline_init','pipeline_summary'].includes(e.evento)).length;
        document.getElementById('nav-file_analysis').textContent=RAW_DATA.filter(e=>e.evento==='file_analysis').length;
        document.getElementById('nav-errors').textContent=errors;
        if(hasErr){ document.getElementById('status-dot').className='status-dot red'; document.getElementById('status-text').textContent=`${errors} error(s)`; }
        else { document.getElementById('status-dot').className='status-dot green'; document.getElementById('status-text').textContent='All systems nominal'; }
        if(summary?.duration_seconds!=null) document.getElementById('sb-duration').textContent=summary.duration_seconds+'s';
        else if(RAW_DATA.length>=2){ let diff=(new Date(RAW_DATA[RAW_DATA.length-1].timestamp)-new Date(RAW_DATA[0].timestamp))/1000; document.getElementById('sb-duration').textContent=diff.toFixed(1)+'s';}
    }
    function buildTimeline(){
        let track=document.getElementById('timeline-track'); track.innerHTML='';
        RAW_DATA.forEach((e,i)=>{let dot=document.createElement('div'); dot.className='timeline-dot '+(isError(e)?'err':(e.evento==='file_analysis'?'ok':'info')); dot.title=`${e.timestamp.split('T')[1]?.slice(0,8)} — ${e.evento}`; dot.onclick=()=>scrollToEvent(i); track.appendChild(dot);});
        if(RAW_DATA.length){ let first=RAW_DATA[0].timestamp.split('T')[1]?.slice(0,8), last=RAW_DATA[RAW_DATA.length-1].timestamp.split('T')[1]?.slice(0,8); document.getElementById('timeline-range').textContent=`${first} → ${last}`;}
    }
    function buildFilterBar(){
        let events=[...new Set(RAW_DATA.map(e=>e.evento))];
        let html='<button class="filter-btn active" onclick="setFilter(\'all\', this)">All</button>';
        events.forEach(ev=>{let isErr=['analysis_error','file_not_found','critical_error'].includes(ev); html+=`<button class="filter-btn ${isErr?'error':''}" onclick="setFilter('${ev}', this)">${ev}</button>`;});
        document.getElementById('filter-bar').innerHTML=html;
    }
    function getFilteredData(){ return RAW_DATA.filter(e=>{ if(currentView==='pipeline' && !['pipeline_start','pipeline_init','pipeline_summary'].includes(e.evento)) return false; if(currentView==='file_analysis' && e.evento!=='file_analysis') return false; if(currentView==='errors' && !isError(e)) return false; if(currentFilter!=='all' && e.evento!==currentFilter) return false; if(searchQuery && !JSON.stringify(e).toLowerCase().includes(searchQuery.toLowerCase())) return false; return true;});}
    function renderEvents(){
        let filtered=getFilteredData(); let body=document.getElementById('events-body');
        document.getElementById('showing-count').textContent=`${filtered.length} of ${RAW_DATA.length}`;
        document.getElementById('status-count').textContent=`${filtered.length} events`;
        if(!filtered.length){ body.innerHTML='<div class="empty-state">No events match filters</div>'; return; }
        body.innerHTML=filtered.map((e,idx)=>{ let originalIdx=RAW_DATA.indexOf(e); let time=e.timestamp.split('T')[1]?.slice(0,12)||e.timestamp; let badgeClass=(()=>{let m={'pipeline_start':'badge-pipeline_start','pipeline_init':'badge-pipeline_init','pipeline_summary':'badge-pipeline_summary','file_analysis':'badge-file_analysis','metadata':'badge-metadata','columns':'badge-columns','analysis_error':'badge-analysis_error','file_not_found':'badge-file_not_found','critical_error':'badge-critical_error'}; return m[e.evento]||'badge-default';})(); let summary=getSummary(e); let isExp=expandedRows.has(originalIdx);
            return `<div class="event-row ${isExp?'expanded':''}" id="row-${originalIdx}" onclick="toggleRow(${originalIdx})"><span class="event-time">${time}</span><span><span class="event-badge ${badgeClass}">${e.evento}</span></span><span class="event-summary">${summary}</span><span class="event-expand">▶</span></div><div class="detail-panel ${isExp?'show':''}" id="detail-${originalIdx}">${buildDetail(e)}</div>`;
        }).join('');
    }
     function getSummary(e) {
            const d = e.detalles || {};

            if (e.evento === 'file_analysis') {
                const rows = d.rows != null ? `${d.rows.toLocaleString()} rows` : '';
                return `<span class="summary-inline">
                    <span class="summary-tag ok">✓</span>
                    <span class="summary-filename">${d.file || ''}</span>
                    ${rows ? `<span class="summary-tag">${rows}</span>` : ''}
                </span>`;
            }

            if (e.evento === 'pipeline_summary') {
                const ok = d.files_ok ?? 0;
                const err = d.files_error ?? 0;
                const rows = d.total_rows != null ? `${d.total_rows.toLocaleString()} rows` : '';
                return `<span class="summary-inline">
                    <span class="summary-tag ok">${ok} ok</span>
                    ${err > 0 ? `<span class="summary-tag err">${err} errors</span>` : ''}
                    ${rows ? `<span class="summary-tag">${rows}</span>` : ''}
                </span>`;
            }

            if (e.evento === 'pipeline_init') {
                const count = d.cantidad || 0;
                const files = d.archivos || [];
                const rowId = `filelist-${Math.random().toString(36).slice(2, 7)}`;
                return `<span class="summary-inline" style="overflow:visible; flex-wrap:wrap; gap:4px;">
                    <span class="summary-tag">${count} files</span>
                    <span class="file-list-toggle" onclick="toggleFileList(event,'${rowId}')">
                        <span class="arrow">▶</span> show files
                    </span>
                    <span class="file-list-dropdown" id="${rowId}">
                        ${files.map((f, i) =>
                    `<span class="file-list-item">
                                <span class="file-list-num">${i + 1}.</span>${f}
                            </span>`
                ).join('')}
                    </span>
                </span>`;
            }

            if (e.evento === 'file_not_found') {
                const path = d.path || '';
                const filename = path.split(/[\\/]/).pop();
                return `<span class="summary-inline">
                    <span class="summary-tag err">✗ not found</span>
                    <span class="summary-filename" title="${path}">${filename}</span>
                </span>`;
            }

            if (e.evento === 'analysis_error' || e.evento === 'critical_error') {
                const msg = d.message || d.error || 'Error occurred';
                return `<span class="summary-inline">
                    <span class="summary-tag err">error</span>
                    <span class="summary-filename">${msg}</span>
                </span>`;
            }

            if (e.evento === 'dashboard_generated') {
                return `<span class="summary-inline">
                    <span class="summary-filename">${d.path || ''}</span>
                </span>`;
            }

            const parts = Object.entries(d).slice(0, 2)
                .map(([k, v]) => `<span class="summary-tag">${k}: ${String(v).slice(0, 20)}</span>`)
                .join('');
            return `<span class="summary-inline">${parts}</span>`;
        }

        function buildDetail(e, idx) {
            const d = e.detalles || {};
            let html = '<div class="detail-grid">';
            const columns = d.columns;
            const rest = Object.entries(d).filter(([k]) => k !== 'columns');

            rest.forEach(([k, v]) => {
                if (Array.isArray(v)) {
                    html += `<div class="detail-field" style="grid-column: 1/-1">
                        <div class="detail-key" style="margin-bottom:8px">${k} (${v.length})</div>
                        <div style="display:flex; flex-wrap:wrap; gap:6px;">
                            ${v.map((item, i) =>
                        `<span class="file-list-item" style="flex:1; min-width:160px;">
                                    <span class="file-list-num">${i + 1}.</span>${item}
                                </span>`
                    ).join('')}
                        </div>
                    </div>`;
                } else {
                    const cls = k === 'success' ? (v ? 'ok' : 'err') :
                        (typeof v === 'number' ? 'num' : '');
                    const display = typeof v === 'number' ? v.toLocaleString() : String(v ?? '—');
                    html += `<div class="detail-field">
                        <div class="detail-key">${k}</div>
                        <div class="detail-val ${cls}">${display}</div>
                    </div>`;
                }
            });

            html += '</div>';

            if (Array.isArray(columns) && columns.length > 0) {
                html += `<div class="cols-section">
                    <div class="cols-toggle" onclick="toggleCols(event, ${idx})" id="cols-toggle-${idx}">
                        <span class="cols-toggle-arrow">▶</span>
                        <span>${columns.length} columns</span>
                    </div>
                    <div class="cols-grid" id="cols-${idx}">
                        ${columns.map((c, i) =>
                    `<div class="col-chip"><span class="col-idx">${i + 1}</span>${c}</div>`
                ).join('')}
                    </div>
                </div>`;
            }

            return html;
        }

        function toggleRow(idx) {
            const row = document.getElementById(`row-${idx}`);
            const detail = document.getElementById(`detail-${idx}`);
            if (!row || !detail) return;
            const isExp = expandedRows.has(idx);
            if (isExp) {
                expandedRows.delete(idx);
                row.classList.remove('expanded');
                detail.classList.remove('show');
            } else {
                expandedRows.add(idx);
                row.classList.add('expanded');
                detail.classList.add('show');
            }
        }

        function toggleCols(event, idx) {
            event.stopPropagation();
            document.getElementById(`cols-${idx}`).classList.toggle('show');
            document.getElementById(`cols-toggle-${idx}`).classList.toggle('open');
        }

        function toggleFileList(event, id) {
            event.stopPropagation();
            const dropdown = document.getElementById(id);
            const toggle = event.currentTarget;
            dropdown.classList.toggle('show');
            const isOpen = dropdown.classList.contains('show');
            toggle.innerHTML = `<span class="arrow">${isOpen ? '▼' : '▶'}</span> ${isOpen ? 'hide files' : 'show files'}`;
        }

        function expandAll() {
            RAW_DATA.forEach((_, i) => {
                expandedRows.add(i);
                document.getElementById(`row-${i}`)?.classList.add('expanded');
                document.getElementById(`detail-${i}`)?.classList.add('show');
            });
        }

        function collapseAll() {
            expandedRows.clear();
            document.querySelectorAll('.event-row').forEach(r => r.classList.remove('expanded'));
            document.querySelectorAll('.detail-panel').forEach(d => d.classList.remove('show'));
        }

        function setView(view, el) {
            currentView = view;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            expandedRows.clear();
            renderEvents();
        }

        function setFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            expandedRows.clear();
            renderEvents();
        }

        function applyFilters() {
            searchQuery = document.getElementById('search-input').value;
            renderEvents();
        }

        function scrollToEvent(idx) {
            const el = document.getElementById(`row-${idx}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                expandedRows.add(idx);
                el.classList.add('expanded');
                document.getElementById(`detail-${idx}`)?.classList.add('show');
            }
        }

        init();
