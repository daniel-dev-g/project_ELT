<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FlowETL — Pipeline Monitor | Dark Elegant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* refined dark palette — elegant & professional */
            --bg-deep: #0a0c0f;
            --bg-surface: #111316;
            --bg-elevated: #181b1f;
            --bg-card: #0f1115;
            --border-subtle: rgba(66, 72, 81, 0.5);
            --border-medium: rgba(88, 102, 118, 0.35);
            --accent-primary: #5c9eff;
            --accent-glow: rgba(92, 158, 255, 0.12);
            --accent-soft: #2d4b7c;
            --text-primary: #f0f3f8;
            --text-secondary: #9aa8b9;
            --text-tertiary: #5f6c7c;
            --success: #2ecc71;
            --success-glow: rgba(46, 204, 113, 0.12);
            --error: #e74c3c;
            --error-glow: rgba(231, 76, 60, 0.12);
            --warning: #f39c12;
            --warning-glow: rgba(243, 156, 18, 0.12);
            --purple-accent: #b77cff;
            --purple-glow: rgba(183, 124, 255, 0.12);
            --cyan-accent: #36d1b0;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            background: var(--bg-deep);
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.45;
            letter-spacing: -0.01em;
        }

        /* refined scanline / noise effect (more elegant) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(10, 15, 25, 0.6) 0%, rgba(0, 0, 0, 0.2) 100%),
                        repeating-linear-gradient(0deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 4px);
            pointer-events: none;
            z-index: 999;
        }

        /* custom scrollbar refined */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-surface);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2c3440;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* topbar — sleek glass effect */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 36px;
            height: 64px;
            background: rgba(17, 19, 22, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 110;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #FFFFFF 0%, #B0C4FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-dot {
            width: 9px;
            height: 9px;
            background: var(--accent-primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-primary);
            animation: softPulse 2.2s infinite;
        }
        @keyframes softPulse {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .topbar-meta {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .execution-badge {
            background: rgba(92, 158, 255, 0.12);
            border: 0.5px solid rgba(92, 158, 255, 0.3);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.2px;
            color: var(--accent-primary);
        }

        /* layout grid */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: calc(100vh - 64px);
        }

        /* sidebar — modern glassmorphic dark */
        .sidebar {
            background: rgba(12, 14, 18, 0.6);
            backdrop-filter: blur(4px);
            border-right: 1px solid var(--border-subtle);
            padding: 28px 0;
            position: sticky;
            top: 64px;
            height: calc(100vh - 64px);
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 0 20px;
            margin-bottom: 32px;
        }
        .sidebar-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 14px;
            padding-left: 8px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            margin-bottom: 6px;
            border: 1px solid transparent;
        }
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.05);
        }
        .nav-item.active {
            background: var(--accent-glow);
            border-color: rgba(92, 158, 255, 0.25);
            color: var(--accent-primary);
        }
        .nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .nav-count {
            margin-left: auto;
            font-size: 12px;
            background: rgba(48, 54, 65, 0.6);
            padding: 2px 8px;
            border-radius: 30px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* summary block */
        .summary-stats {
            background: rgba(24, 27, 31, 0.6);
            border-radius: 16px;
            padding: 12px 16px;
            margin-top: 8px;
            border: 0.5px solid var(--border-subtle);
        }
        .summary-stats > div {
            font-size: 13px;
            line-height: 1.8;
        }

        /* main area */
        .main {
            padding: 32px 36px;
            background: radial-gradient(ellipse at 20% 30%, rgba(20, 25, 35, 0.2), transparent);
        }

        /* KPI cards — elegant gradient borders & smooth hover */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 20px 22px;
            position: relative;
            transition: all var(--transition-smooth);
            backdrop-filter: blur(2px);
            overflow: hidden;
        }
        .kpi-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            border-color: rgba(92, 158, 255, 0.5);
            box-shadow: 0 12px 28px -12px rgba(0,0,0,0.5);
        }
        .kpi-card:hover::after {
            opacity: 0.6;
        }
        .kpi-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .kpi-value {
            font-family: 'Outfit', sans-serif;
            font-size: 38px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 6px;
            letter-spacing: -1px;
        }
        .kpi-card.blue .kpi-value { color: var(--accent-primary); }
        .kpi-card.green .kpi-value { color: var(--success); }
        .kpi-card.red .kpi-value { color: var(--error); }
        .kpi-card.purple .kpi-value { color: var(--purple-accent); }
        .kpi-sub {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* timeline wrap refined */
        .timeline-wrap {
            background: rgba(15, 17, 21, 0.7);
            backdrop-filter: blur(4px);
            border: 0.5px solid var(--border-subtle);
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 32px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, var(--accent-primary), #80b6ff);
            border-radius: 4px;
        }
        .timeline-track {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .timeline-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 0px rgba(0,0,0,0);
        }
        .timeline-dot:hover {
            transform: scale(1.45);
            box-shadow: 0 0 8px currentColor;
        }
        .timeline-dot.ok { background: var(--success); box-shadow: 0 0 4px var(--success); }
        .timeline-dot.err { background: var(--error); box-shadow: 0 0 4px var(--error); }
        .timeline-dot.info { background: var(--accent-primary); }
        .timeline-dot.warn { background: var(--warning); }

        /* search & filters */
        .search-wrap {
            position: relative;
            margin-bottom: 18px;
        }
        .search-input {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 44px;
            padding: 12px 20px 12px 48px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }
        .search-input:focus {
            border-color: var(--accent-primary);
            outline: none;
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-tertiary);
        }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            background: rgba(24, 27, 31, 0.8);
            border: 0.5px solid var(--border-subtle);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            background: rgba(92, 158, 255, 0.2);
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        .filter-btn.active {
            background: var(--accent-glow);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }
        .filter-btn.success.active {
            background: var(--success-glow);
            border-color: var(--success);
            color: var(--success);
        }
        .filter-btn.error.active {
            background: var(--error-glow);
            border-color: var(--error);
            color: var(--error);
        }

        /* event table — minimal & airy */
        .event-table {
            background: var(--bg-surface);
            border-radius: 20px;
            border: 0.5px solid var(--border-subtle);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }
        .event-table-header {
            display: grid;
            grid-template-columns: 150px 160px 1fr 80px;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid var(--border-subtle);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: var(--text-tertiary);
        }
        .event-row {
            display: grid;
            grid-template-columns: 150px 160px 1fr 80px;
            padding: 0 20px;
            border-bottom: 0.5px solid var(--border-subtle);
            cursor: pointer;
            transition: background 0.15s;
            min-height: 56px;
            align-items: center;
        }
        .event-row:last-child {
            border-bottom: none;
        }
        .event-row:hover {
            background: rgba(92, 158, 255, 0.04);
        }
        .event-time {
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            color: var(--text-secondary);
        }
        .event-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: -0.2px;
            background: rgba(48, 54, 65, 0.4);
            color: var(--text-secondary);
            border: 0.5px solid rgba(255,255,255,0.05);
        }
        .badge-pipeline_start, .badge-pipeline_init {
            background: var(--accent-glow);
            color: var(--accent-primary);
            border-color: rgba(92, 158, 255, 0.25);
        }
        .badge-file_analysis {
            background: var(--success-glow);
            color: var(--success);
            border-color: rgba(46, 204, 113, 0.2);
        }
        .badge-pipeline_summary {
            background: var(--purple-glow);
            color: var(--purple-accent);
        }
        .badge-metadata, .badge-columns {
            background: rgba(183, 124, 255, 0.1);
            color: #ca9eff;
        }
        .badge-analysis_error, .badge-critical_error, .badge-file_not_found {
            background: var(--error-glow);
            color: var(--error);
        }
        .event-summary {
            font-size: 13px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 12px;
        }
        .event-expand {
            font-size: 12px;
            color: var(--text-tertiary);
            text-align: right;
            transition: transform 0.2s, color 0.2s;
        }
        .event-row.expanded .event-expand {
            transform: rotate(90deg);
            color: var(--accent-primary);
        }

        /* detail panel glass */
        .detail-panel {
            display: none;
            padding: 20px 24px;
            background: rgba(8, 10, 14, 0.7);
            border-top: 1px solid var(--border-subtle);
            backdrop-filter: blur(8px);
        }
        .detail-panel.show {
            display: block;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
        }
        .detail-field {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 12px 16px;
            border: 0.5px solid var(--border-subtle);
        }
        .detail-key {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }
        .detail-val {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .detail-val.num { color: var(--accent-primary); font-family: monospace; }
        .detail-val.ok { color: var(--success); }
        .detail-val.err { color: var(--error); }

        .cols-section {
            margin-top: 16px;
        }
        .cols-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            cursor: pointer;
            color: var(--accent-primary);
            background: rgba(92,158,255,0.08);
            padding: 4px 14px;
            border-radius: 40px;
            transition: 0.2s;
        }
        .cols-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            margin-top: 14px;
        }
        .cols-grid.show {
            display: grid;
        }
        .col-chip {
            background: rgba(24, 27, 31, 0.9);
            border: 0.5px solid var(--border-subtle);
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 12px;
            display: flex;
            gap: 8px;
            color: var(--text-secondary);
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            background: rgba(0,0,0,0.2);
            border-top: 0.5px solid var(--border-subtle);
            font-size: 12px;
        }

        .file-list-toggle {
            display: inline-flex;
            gap: 6px;
            font-size: 12px;
            background: rgba(92,158,255,0.1);
            padding: 2px 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.15s;
        }
        .file-list-dropdown {
            display: none;
            flex-direction: column;
            gap: 6px;
            margin-top: 12px;
            background: var(--bg-elevated);
            border-radius: 14px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .file-list-dropdown.show { display: flex; }
        .file-list-item {
            font-size: 12px;
            padding: 4px 8px;
            border-left: 2px solid var(--accent-primary);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-tertiary);
        }
        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .kpi-grid { grid-template-columns: repeat(2,1fr); }
            .main { padding: 20px; }
            .event-table-header, .event-row {
                grid-template-columns: 110px 120px 1fr;
            }
            .event-table-header > :last-child, .event-row > :last-child { display: none; }
        }
    </style>
</head>
<body>
<div class="topbar">
    <div class="logo"><div class="logo-dot"></div>FlowETL</div>
    <div class="topbar-meta"><span id="log-filename">—</span><span class="execution-badge" id="exec-id">execution_id</span><span id="last-update"></span></div>
</div>
<div class="layout">
    <aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">Views</div>
        <div class="nav-item active" onclick="setView('all', this)"><div class="nav-dot" style="background: var(--accent-primary)"></div>All Events<span class="nav-count" id="nav-all">0</span></div>
        <div class="nav-item" onclick="setView('pipeline', this)"><div class="nav-dot" style="background: var(--purple-accent)"></div>Pipeline<span class="nav-count" id="nav-pipeline">0</span></div>
        <div class="nav-item" onclick="setView('file_analysis', this)"><div class="nav-dot" style="background: var(--success)"></div>File Analysis<span class="nav-count" id="nav-file_analysis">0</span></div>
        <div class="nav-item" onclick="setView('errors', this)"><div class="nav-dot" style="background: var(--error)"></div>Errors<span class="nav-count" id="nav-errors">0</span></div>
    </div>
    <div class="sidebar-section"><div class="sidebar-label">Summary</div><div class="summary-stats"><div>Files: <span id="sb-files">—</span></div><div>Rows: <span id="sb-rows">—</span></div><div>Duration: <span id="sb-duration">—</span></div><div>Status: <span id="sb-status">—</span></div></div></div></aside>
    <main class="main">
        <div class="kpi-grid"><div class="kpi-card blue"><div class="kpi-label">Total Events</div><div class="kpi-value" id="kpi-total">—</div><div class="kpi-sub">log entries</div></div>
        <div class="kpi-card green"><div class="kpi-label">Files OK</div><div class="kpi-value" id="kpi-success">—</div><div class="kpi-sub">analyzed</div></div>
        <div class="kpi-card red"><div class="kpi-label">Errors</div><div class="kpi-value" id="kpi-errors">—</div><div class="kpi-sub">failed files</div></div>
        <div class="kpi-card purple"><div class="kpi-label">Total Rows</div><div class="kpi-value" id="kpi-rows">—</div><div class="kpi-sub">processed</div></div></div>
        <div class="timeline-wrap"><div class="section-header"><div class="section-title">Event Timeline</div><span id="timeline-range" style="font-size:12px;"></span></div><div class="timeline-track" id="timeline-track"></div></div>
        <div class="section-header"><div class="section-title">Event Log</div><div><button class="filter-btn" onclick="expandAll()">Expand All</button><button class="filter-btn" onclick="collapseAll()" style="margin-left:6px;">Collapse</button></div></div>
        <div class="search-wrap"><span class="search-icon">⌕</span><input class="search-input" id="search-input" placeholder="Search events, files, columns..." oninput="applyFilters()"></div>
        <div class="filters" id="filter-bar"></div>
        <div class="event-table"><div class="event-table-header"><span>Timestamp</span><span>Event</span><span>Summary</span><span style="text-align:right">▶</span></div><div id="events-body"></div><div class="status-bar"><div class="status-dot green" id="status-dot"></div><span id="status-text">Ready</span><span style="margin-left:auto" id="status-count"></span></div></div>
    </main>
</div>
<script>
    const RAW_DATA = __LOG_DATA__ || [];
    let currentView='all', currentFilter='all', searchQuery='', expandedRows=new Set();
    function init(){
        if(!RAW_DATA.length){ document.getElementById('events-body').innerHTML='<div class="empty-state">No log data</div>'; return; }
        buildKPIs(); buildTimeline(); buildFilterBar(); renderEvents();
        let execId = (RAW_DATA.find(e=>e.detalles?.execution_id)?.detalles?.execution_id) || 'unknown';
        document.getElementById('exec-id').textContent=execId.slice(0,8)+'...';
        let last=RAW_DATA[RAW_DATA.length-1];
        document.getElementById('last-update').textContent=last?.timestamp?.split('T')[1]?.slice(0,8)||'';
        document.getElementById('log-filename').textContent='pipeline.log';
    }
    function getPipelineSummary(){ return RAW_DATA.find(e=>e.evento==='pipeline_summary')?.detalles||null; }
